<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ASPIC — 404</title>
    <link rel="icon"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='80' font-size='80' text-anchor='middle' font-family='Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif'%3E📦%3C/text%3E%3C/svg%3E"
          type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-container">
    <header class="app-header compact" id="appHeader">
        <h1 class="app-title">📦 ASPIC</h1>
        <p class="app-subtitle">Минималистичный файловый хостинг без регистрации и сроков хранения</p>
    </header>

    <main class="app-main">
        <div class="error-container" style="text-align: center; padding: 3rem 1rem;">
            <div style="font-size: 5rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite;">🔌</div>
            <h2 style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;">404 - Страница не найдена</h2>
            <p style="font-size: 1.2rem; color: var(--gray); margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
                {{ message }}
            </p>
        </div>
    </main>

    <footer class="app-footer">
        <p>ASPIC — A Simple Public Image/File Cloud · <a href="https://github.com/dneupokoev/aspic" target="_blank" rel="noopener">GitHub</a></p>
    </footer>
</div>

<style>
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
</style>
</body>
</html>
