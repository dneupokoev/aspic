<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASPIC — загрузка файла</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 ASPIC</h1>
            <p class="subtitle">Загрузите файл и получите ссылку</p>
        </header>

        <!-- Форма загрузки с drag-and-drop -->
        <div class="upload-container">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">⬆️</div>
                <p class="upload-text">Перетащите файл сюда или <span class="link">выберите</span></p>
                <p class="upload-hint">Максимальный размер: 100 MB</p>
                <input type="file" id="fileInput" style="display: none;">
            </div>

            <!-- Индикатор прогресса -->
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
                <p class="progress-text" id="progressText">Загрузка...</p>
            </div>

            <!-- Результат загрузки -->
            <div class="result-container" id="resultContainer" style="display: none;">
                <div class="result-icon">✅</div>
                <p class="result-title">Файл успешно загружен!</p>
                <div class="result-url">
                    <input type="text" id="fileUrl" readonly value="">
                    <button class="copy-btn" onclick="copyUrl()">📋 Копировать</button>
                </div>
                <p class="result-hint">Ссылка вечная, но файл может быть удалён любым пользователем после капчи</p>
            </div>

            <!-- Сообщение об ошибке -->
            <div class="error-container" id="errorContainer" style="display: none;">
                <div class="error-icon">❌</div>
                <p class="error-text" id="errorText"></p>
                <button class="retry-btn" onclick="resetUpload()">Попробовать снова</button>
            </div>
        </div>

        <footer>
            <p>ASPIC — файлы живут вечно, пока кто-то не нажмёт «Удалить»</p>
        </footer>
    </div>

    <script src="/static/js/upload.js"></script>
</body>
</html>
